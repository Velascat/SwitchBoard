site_name: SwitchBoard
site_description: Policy-driven execution-lane selector for canonical task proposals
site_url: https://velascat.github.io/SwitchBoard/
repo_url: https://github.com/Velascat/SwitchBoard
repo_name: Velascat/SwitchBoard
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: README.md
  - Get Started:
    - Quickstart: quickstart.md
    - Configuration: reference/configuration.md
  - Routing:
    - Routing: routing/routing.md
    - Routing Examples: routing/routing-examples.md
    - Request Flow: routing/request-flow.md
    - Lanes: routing/lanes.md
    - Policies: routing/policies.md
  - Reference:
    - API: reference/api.md
  - Operate:
    - Observability: operate/observability.md
    - Troubleshooting: operate/troubleshooting.md
    - Stability: operate/stability.md
  - System:
    - Architecture: system/architecture.md
    - Roadmap: system/roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
