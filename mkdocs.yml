site_name: SwitchBoard
site_description: Policy-driven model selection service — clients → SwitchBoard → 9router → providers
site_url: https://velascat.github.io/SwitchBoard/
repo_url: https://github.com/Velascat/SwitchBoard
repo_name: Velascat/SwitchBoard
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Get Started:
    - Quickstart: quickstart.md
    - Configuration: configuration.md
  - Reference:
    - API: api.md
    - Architecture: architecture.md
    - Request Flow: request-flow.md
    - Policies: policies.md
    - Profiles: profiles.md
    - Capabilities: capabilities.md
  - Operations:
    - Observability: observability.md
    - Troubleshooting: troubleshooting.md
  - Project:
    - Stability: stability.md
    - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
