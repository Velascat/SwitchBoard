# SwitchBoard Model Profiles
# Section 6.4
#
# Each profile is a named set of requirements and preferences.
# Profiles decouple the policy rules from the actual downstream model
# identifiers — you can change the upstream model without touching the
# policy rules.
#
# Required fields per profile:
#   downstream_model    The model identifier sent to 9router.
#   tags                Free-form list of capability tags.
#
# Optional metadata fields:
#   description         Human-readable explanation.
#   preferred_provider  Hint to 9router about which provider to prefer.
#   max_context_tokens  Maximum supported context window (informational).
#   supports_tools      Whether this profile's model reliably supports tool use.
#   supports_vision     Whether this profile's model supports image inputs.
#   supports_structured_output  Whether this profile reliably produces JSON output. (Phase 8)
#   cost_tier           Relative cost tier: low | medium | high
#   cost_weight         Precise relative cost (Phase 8); overrides cost_tier in scorer.
#   latency_tier        Relative latency tier: low | medium | high
#   quality_tier        Relative quality tier: low | medium | high  (Phase 8)

version: "1"

profiles:

  # ------------------------------------------------------------------
  # fast — low-latency, low-cost model for short routine requests
  # ------------------------------------------------------------------
  fast:
    downstream_model: gpt-4o-mini
    tags:
      - general
      - chat
      - summarisation
      - classification
    description: >
      Low-latency, cost-efficient model suitable for short conversational
      turns, summarisation, and classification tasks.
    preferred_provider: openai
    max_context_tokens: 128000
    supports_tools: true
    supports_vision: false
    supports_structured_output: true
    cost_tier: low
    cost_weight: 1.0
    latency_tier: low
    quality_tier: medium

  # ------------------------------------------------------------------
  # capable — high-quality model for complex or long-context tasks
  # ------------------------------------------------------------------
  capable:
    downstream_model: gpt-4o
    tags:
      - reasoning
      - code
      - long-context
      - tool-use
      - complex
    description: >
      High-capability model for complex reasoning, long-context tasks,
      code generation, and multi-step tool use.
    preferred_provider: openai
    max_context_tokens: 128000
    supports_tools: true
    supports_vision: true
    supports_structured_output: true
    cost_tier: high
    cost_weight: 10.0
    latency_tier: medium
    quality_tier: high

  # ------------------------------------------------------------------
  # local — on-premise model for private or low-priority workloads
  # ------------------------------------------------------------------
  local:
    downstream_model: llama3
    tags:
      - private
      - on-premise
      - low-cost
      - batch
    description: >
      Locally hosted open-weight model.  No data leaves the network.
      Suitable for sensitive data, batch/background tasks, and cost
      reduction for low-priority requests.
    preferred_provider: ollama
    max_context_tokens: 8192
    supports_tools: false
    supports_vision: false
    supports_structured_output: false
    cost_tier: low
    cost_weight: 0.1
    latency_tier: medium
    quality_tier: medium

  # ------------------------------------------------------------------
  # default — generic fallback used when no rule matches
  # ------------------------------------------------------------------
  default:
    downstream_model: gpt-4o-mini
    tags:
      - fallback
    description: >
      Generic fallback profile.  Resolves to the same downstream model
      as the 'fast' profile but signals that no explicit rule was matched.
    preferred_provider: openai
    max_context_tokens: 128000
    supports_tools: true
    supports_vision: false
    supports_structured_output: true
    cost_tier: low
    cost_weight: 1.0
    latency_tier: low
    quality_tier: medium
