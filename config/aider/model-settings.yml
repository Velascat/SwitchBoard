# Aider model settings for SwitchBoard profiles.
#
# Pass this file to Aider with:
#   aider --model-settings-file config/aider/model-settings.yml
#
# Each entry maps an Aider model name to SwitchBoard profile behaviour.
# The "openai/" prefix tells Aider (via LiteLLM) to use the OpenAI-compatible
# endpoint configured in OPENAI_API_BASE.

# fast — low-latency profile (maps to gpt-4o-mini or equivalent)
- name: openai/fast
  edit_format: whole
  use_repo_map: false
  streaming: true
  use_temperature: true
  weak_model_name: openai/fast

# capable — high-quality profile (maps to gpt-4o or equivalent)
- name: openai/capable
  edit_format: diff
  use_repo_map: true
  streaming: true
  use_temperature: true
  weak_model_name: openai/fast

# local — on-premise profile (maps to llama3 or equivalent)
- name: openai/local
  edit_format: whole
  use_repo_map: false
  streaming: true
  use_temperature: true
  weak_model_name: openai/local
