# SwitchBoard Capability Registry
# Section 6.5
#
# Describes the capabilities of each downstream model available to the execution stack.
# This is separate from profiles.yaml: profiles map names → models, while
# capabilities.yaml describes what each model can do.
#
# The capability registry is used by the policy engine and profile registry to
# make routing decisions based on model features.
#
# Schema per model entry:
#   supports_tools          Whether the model reliably supports function calling.
#   supports_streaming      Whether the model supports SSE streaming responses.
#   supports_long_context   Whether the model has a large context window (> 32 k).
#   quality                 Relative quality tier: low | medium | high
#   cost_tier               Relative cost tier: low | medium | high

version: "1"

models:

  gpt-4o-mini:
    supports_tools: true
    supports_streaming: true
    supports_long_context: true
    quality: medium
    cost_tier: low

  gpt-4o:
    supports_tools: true
    supports_streaming: true
    supports_long_context: true
    quality: high
    cost_tier: high

  llama3:
    supports_tools: false
    supports_streaming: true
    supports_long_context: false
    quality: medium
    cost_tier: low

  claude-3-5-sonnet:
    supports_tools: true
    supports_streaming: true
    supports_long_context: true
    quality: high
    cost_tier: high

# ---------------------------------------------------------------------------
# Legacy profiles section — kept for backward-compat with CapabilityRegistry
# which reads the ``profiles`` key to resolve profile → downstream_model.
# ---------------------------------------------------------------------------

profiles:

  fast:
    downstream_model: gpt-4o-mini
    provider_hint: openai

  capable:
    downstream_model: gpt-4o
    provider_hint: openai

  local:
    downstream_model: llama3
    provider_hint: ollama

  default:
    downstream_model: gpt-4o-mini
    provider_hint: openai
