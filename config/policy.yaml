# SwitchBoard Policy Configuration
#
# Rules are evaluated in ascending priority order (lower number = evaluated first).
# The first rule whose ``when`` conditions ALL match the SelectionContext wins.
# If no rule matches, the fallback_profile is used.
#
# Condition keys map to SelectionContext attributes:
#   stream                boolean
#   tools_present         boolean
#   requires_tools        boolean
#   requires_long_context boolean
#   task_type                    string  — "code" | "analysis" | "planning" | "summarization" | "chat"
#   complexity                   string  — "low" | "medium" | "high"
#   cost_sensitivity             string  — "low" | "high"  (from X-SwitchBoard-Cost-Sensitivity header)
#   latency_sensitivity          string  — "low" | "high"  (from X-SwitchBoard-Latency-Sensitivity header)
#   priority                     string  (from X-SwitchBoard-Priority header)
#   tenant_id                    string  (from X-SwitchBoard-Tenant-ID header)
#   model_hint                   string  (the model field the caller sent)
#   min_estimated_tokens         integer (context.estimated_tokens >= value)
#   max_estimated_tokens         integer (context.estimated_tokens <= value)
#   min_max_tokens               integer (context.max_tokens >= value)
#   max_max_tokens               integer (context.max_tokens <= value)
#   requires_structured_output   boolean (true when response_format is json_object or json_schema)
#   requires_long_context        boolean (true when estimated_tokens > 6 000)
#   requires_tools               boolean (true when a non-empty tools array is present)
#
# List values use "any of" semantics: task_type: ["code", "planning"] matches either.

version: "1"
fallback_profile: "default"

rules:

  # ------------------------------------------------------------------
  # Priority 10 — explicit caller overrides (model hint)
  # ------------------------------------------------------------------

  - name: caller_requests_capable
    priority: 10
    select_profile: capable
    description: >
      Caller explicitly requested the capable profile via model hint.
    when:
      model_hint: ["capable", "gpt-4o", "claude-3-5-sonnet"]

  - name: caller_requests_local
    priority: 11
    select_profile: local
    description: >
      Caller explicitly requested the local/private profile.
    when:
      model_hint: ["local", "private", "llama3", "ollama"]

  # ------------------------------------------------------------------
  # Priority 20 — high-priority tenants always get the capable model
  # ------------------------------------------------------------------

  - name: high_priority_tenant
    priority: 20
    select_profile: capable
    description: >
      Requests from high-priority tenants are always routed to the capable model
      regardless of estimated token count.
    when:
      priority: "high"

  # ------------------------------------------------------------------
  # Priority 30 — tool use requires a model with function-calling support
  # ------------------------------------------------------------------

  - name: tool_use
    priority: 30
    select_profile: capable
    description: >
      Requests that include a tools array need a model with reliable
      function-calling capability.
    when:
      tools_present: true

  # ------------------------------------------------------------------
  # Priority 35-38 — task type routing
  # ------------------------------------------------------------------

  - name: coding_task
    priority: 35
    select_profile: capable
    description: >
      Code generation, debugging, and refactoring tasks route to the capable
      model for higher quality output.  Detected by code fences or coding
      keyword phrases in the request.
    when:
      task_type: "code"

  - name: planning_task
    priority: 38
    select_profile: capable
    description: >
      Architecture, design, and planning tasks route to the capable model.
      Detected by planning keyword phrases in the request.
    when:
      task_type: "planning"

  # ------------------------------------------------------------------
  # Priority 40 — streaming short requests go to the fast model
  # ------------------------------------------------------------------

  - name: streaming_short
    priority: 40
    select_profile: fast
    description: >
      Short streaming requests (≤ 512 estimated tokens) go to the fast
      low-latency model to minimise time-to-first-token.
    when:
      stream: true
      max_estimated_tokens: 512

  # ------------------------------------------------------------------
  # Priority 45 — summarization is a fast-model fit
  # ------------------------------------------------------------------

  - name: summarization_task
    priority: 45
    select_profile: fast
    description: >
      Summarization requests (≤ 3 000 tokens input) are well-served by the
      fast model.  Larger summarization tasks fall through to the large_context
      rule below.
    when:
      task_type: "summarization"
      max_estimated_tokens: 3000

  # ------------------------------------------------------------------
  # Priority 50 — large context requests go to the capable model
  # ------------------------------------------------------------------

  - name: large_context
    priority: 50
    select_profile: capable
    description: >
      Requests with a large estimated token count (> 4 096) require a
      model with a large context window.
    when:
      min_estimated_tokens: 4096

  # ------------------------------------------------------------------
  # Priority 55 — high complexity goes to capable
  # ------------------------------------------------------------------

  - name: high_complexity
    priority: 55
    select_profile: capable
    description: >
      High-complexity requests (> 3 000 tokens, > 8 messages, or tool use)
      route to the capable model for quality.
    when:
      complexity: "high"

  # ------------------------------------------------------------------
  # Priority 60 — long requested output goes to capable
  # ------------------------------------------------------------------

  - name: long_output_requested
    priority: 60
    select_profile: capable
    description: >
      Caller requested more than 2 048 output tokens; route to the capable
      model which handles long outputs more reliably.
    when:
      min_max_tokens: 2048

  # ------------------------------------------------------------------
  # Priority 65 — cost-sensitive non-complex requests stay on fast
  # ------------------------------------------------------------------

  - name: cost_sensitive_non_complex
    priority: 65
    select_profile: fast
    description: >
      Callers that signal high cost-sensitivity (X-SwitchBoard-Cost-Sensitivity: high)
      are kept on the fast model as long as the request is not complex.
    when:
      cost_sensitivity: "high"
      complexity: ["low", "medium"]

  # ------------------------------------------------------------------
  # Priority 70 — low-priority / background tasks go to local model
  # ------------------------------------------------------------------

  - name: low_priority_local
    priority: 70
    select_profile: local
    description: >
      Low-priority background requests are sent to the local model to
      minimise cloud API spend.
    when:
      priority: "low"

  # ------------------------------------------------------------------
  # Priority 100 — catch-all fast path for ordinary short requests
  # ------------------------------------------------------------------

  - name: default_short_request
    priority: 100
    select_profile: fast
    description: >
      Ordinary short requests (≤ 4 096 estimated tokens, no special requirements)
      go to the fast model.
    when:
      max_estimated_tokens: 4096

# ---------------------------------------------------------------------------
# Phase 8 — A/B Experiments
#
# Each experiment intercepts requests where the policy selects profile_a
# and routes a split_percent percentage to profile_b instead.
#
# Fields:
#   name               Unique identifier recorded in decision logs.
#   profile_a          Control profile (majority of traffic).
#   profile_b          Treatment profile (split_percent % of traffic).
#   split_percent      Percentage sent to profile_b (0-100).
#   enabled            Set to false to pause without removing the config.
#   applies_to_rules   Restrict to specific rule names (empty = all rules).
#
# Example (disabled by default — enable to activate):
# ---------------------------------------------------------------------------

experiments: []

# To activate an experiment, replace the empty list above with entries like:
#
# experiments:
#   - name: capable_vs_fast_chat
#     profile_a: capable
#     profile_b: fast
#     split_percent: 10
#     enabled: true
#     applies_to_rules:
#       - default_short_request
