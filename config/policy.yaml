version: "1"

rules:
  - name: force_local_only
    priority: 10
    select_lane: aider_local
    select_backend: direct_local
    when:
      local_only: true
    confidence: 1.0
    description: Proposal explicitly requires local-only execution.

  - name: local_low_risk
    priority: 20
    select_lane: aider_local
    select_backend: direct_local
    when:
      task_type:
        - lint_fix
        - documentation
        - simple_edit
      max_risk_level: low
    confidence: 0.95
    description: Low-risk, bounded task suitable for local execution.

  - name: medium_implementation
    priority: 30
    select_lane: claude_cli
    select_backend: kodo
    when:
      task_type:
        - bug_fix
        - test_write
        - dependency_update
      risk_level:
        - low
        - medium
    confidence: 0.9
    description: Medium implementation work routes to the premium coding lane.

  - name: premium_structured
    priority: 40
    select_lane: claude_cli
    select_backend: archon_then_kodo
    when:
      task_type:
        - refactor
        - feature
      risk_level:
        - medium
        - high
    confidence: 0.85
    description: High-complexity structured task uses workflow-backed execution.

  - name: high_risk_escalation
    priority: 50
    select_lane: claude_cli
    select_backend: kodo
    when:
      risk_level: high
    confidence: 0.92
    description: High-risk work escalates to the premium coding lane.

  - name: local_catchall
    priority: 60
    select_lane: aider_local
    select_backend: direct_local
    when:
      task_type:
        - lint_fix
        - documentation
        - simple_edit
    confidence: 0.8
    description: Local-eligible work prefers the local lane when constraints allow it.

backend_rules:
  - name: codex_kodo_low_risk
    lane: codex_cli
    select_backend: kodo
    when:
      risk_level:
        - low
        - medium
    description: Prefer lightweight kodo execution for codex lane on low or medium risk.

fallback:
  lane: claude_cli
  backend: kodo
  rationale: Default fallback when no lane rule matches.

thresholds:
  min_confidence_to_select: 0.0
  local_lane_max_risk: low

excluded_backends: []

alternative_routes:
  - name: local_to_remote_fallback
    lane: claude_cli
    backend: kodo
    role: fallback
    cost_class: medium
    capability_class: enhanced
    from_lanes:
      - aider_local
    blocked_by_labels:
      - local_only
      - no_remote
    priority: 10
    confidence: 0.85
    reason: Premium lane fallback when local execution is unavailable or insufficient.
    notes: Only use after a local execution attempt fails or is unavailable.

  - name: workflow_to_kodo_fallback
    lane: claude_cli
    backend: kodo
    role: fallback
    cost_class: medium
    capability_class: enhanced
    from_lanes:
      - claude_cli
    from_backends:
      - archon_then_kodo
    blocked_by_labels: []
    priority: 10
    confidence: 0.8
    reason: Lightweight kodo execution if the workflow backend is unavailable.

  - name: local_to_premium_escalation
    lane: claude_cli
    backend: kodo
    role: escalation
    cost_class: medium
    capability_class: enhanced
    from_lanes:
      - aider_local
    applies_when:
      risk_level:
        - medium
        - high
    blocked_by_labels:
      - local_only
      - no_remote
    priority: 10
    confidence: 0.9
    reason: Higher risk warrants escalation to a premium lane.

  - name: kodo_to_workflow_for_complex_task
    lane: claude_cli
    backend: archon_then_kodo
    role: escalation
    cost_class: high
    capability_class: workflow
    from_lanes:
      - claude_cli
    from_backends:
      - kodo
    applies_when:
      task_type:
        - refactor
        - feature
    blocked_by_labels:
      - local_only
      - no_remote
    priority: 10
    confidence: 0.85
    reason: Complex structural change benefits from a workflow-backed execution path.
    notes: Only warranted for refactor or feature work.

  - name: kodo_to_workflow_for_high_risk
    lane: claude_cli
    backend: archon_then_kodo
    role: escalation
    cost_class: high
    capability_class: workflow
    from_lanes:
      - claude_cli
    from_backends:
      - kodo
    applies_when:
      risk_level: high
    blocked_by_labels:
      - local_only
      - no_remote
    priority: 20
    confidence: 0.88
    reason: High-risk work benefits from structured workflow orchestration.
