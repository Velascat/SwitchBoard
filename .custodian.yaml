repo_key: SwitchBoard
src_root: src
tests_root: test

# Minimum baseline — runs Custodian's generic C1-C8 only.
# Add `plugins:` and `detectors:` here when this repo grows its own
# `_custodian/` overlay layer (see OperationsCenter for a worked example).

audit:
  exclude_paths:
    D1:
      # get_tracer is a public OTEL-compatible API, intentionally dead until
      # OTEL is wired in. errors.py helpers are pre-written FastAPI helpers
      # awaiting route wiring.
      - src/switchboard/observability/tracing.py
      - src/switchboard/api/errors.py
