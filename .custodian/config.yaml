repo_key: SwitchBoard
src_root: src
tests_root: test

# Minimum baseline — runs Custodian's generic C1-C8 only.
# Add `plugins:` and `detectors:` here when this repo grows its own
# `_custodian/` overlay layer (see OperationsCenter for a worked example).

audit:
  exclude_paths:
    D1:
      # get_tracer is a public OTEL-compatible API, intentionally dead until
      # OTEL is wired in. errors.py helpers are pre-written FastAPI helpers
      # awaiting route wiring.
      - src/switchboard/observability/tracing.py
      - src/switchboard/api/errors.py
    T1:
      # FastAPI API layer: route handlers and response models are tested via
      # HTTP (TestClient/AsyncClient) rather than direct function calls, so
      # symbol names never appear in test files even when routes are covered.
      - src/switchboard/api/errors.py
      - src/switchboard/api/routes_health.py
      - src/switchboard/api/routes_routing.py
      - src/switchboard/api/routes_admin.py
      # App infrastructure (lifespan, main) tested via HTTP smoke tests;
      # Settings loaded at runtime from config files.
      - src/switchboard/app.py
      - src/switchboard/config/__init__.py
      # JsonlDecisionSink is tested transitively through DecisionLogger tests;
      # serialize_cxrp_lane_decision is tested through CxRP emission tests.
      - src/switchboard/adapters/jsonl_decision_sink.py
      - src/switchboard/adapters/cxrp_mapper.py
      # Lane explanation models are produced by the engine and tested
      # transitively through engine + routing integration tests.
      - src/switchboard/lane/explain.py
      - src/switchboard/lane/policy.py
      - src/switchboard/domain/capability_model.py
      # Observability infrastructure (logging, metrics, tracing) is wired at
      # app startup; not unit-tested directly.
      - src/switchboard/observability/logging.py
      - src/switchboard/observability/metrics.py
      - src/switchboard/observability/tracing.py
      # Port protocols and return-value dataclasses tested through their
      # containing services; these types appear in service signatures not tests.
      - src/switchboard/ports/decision_sink.py
      - src/switchboard/services/adjustment_store.py
      - src/switchboard/services/decision_logger.py
      - src/switchboard/lane/catalog_advisor.py
      - src/switchboard/ports/executor_catalog.py
    T6:
      # FastAPI API layer + adapters + observability — exercised via TestClient
      # and CxRP emission tests, not by name-import.
      - "src/switchboard/api/**"
      - "src/switchboard/adapters/**"
      - "src/switchboard/observability/**"
      - "src/switchboard/ports/**"
      - "src/switchboard/services/**"
      - src/switchboard/app.py
      - src/switchboard/lane/explain.py
      - src/switchboard/lane/policy.py
      - src/switchboard/lane/catalog_advisor.py
      - src/switchboard/domain/capability_model.py
    T7:
      - "src/switchboard/api/**"
      - "src/switchboard/adapters/**"
      - "src/switchboard/observability/**"
      - "src/switchboard/ports/**"
      - "src/switchboard/services/**"
      - "src/switchboard/lane/**"
      - "src/switchboard/domain/**"
      - "src/switchboard/config/**"
      - src/switchboard/app.py
    D11:
      # routes_admin enable/disable/reset is the standard CRUD trio.
      # lane/escalation + lane/fallback both implement evaluate() — strategy
      # pattern, intentional shape similarity.
      - src/switchboard/api/routes_admin.py
      - "src/switchboard/lane/**"
  # K1 phantoms in routing policy docs: `complexity`, `profile_b`,
  # `split_percent` are routing-policy vocabulary, not Python symbols.
  common_words:
    - complexity
    - profile_b
    - split_percent

tools:
  ruff: true
  vulture: true

# ---------------------------------------------------------------------------
# Privacy / boundary enforcement (Custodian B-class)
# ---------------------------------------------------------------------------
# Names listed here cause Custodian B1 to fail any tracked file that
# mentions them. Default excludes (.console/**, config/managed_repos/local/**,
# docs/history/**, tools/audit/report/**, .custodian/config.yaml itself)
# spare operator-private and historical surfaces.
privacy:
  private_repo_names:
    - VideoFoundry
    - videofoundry
