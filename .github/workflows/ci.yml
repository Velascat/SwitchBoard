name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  license-check:
    name: License headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: |
          missing=$(git ls-files "*.py" | xargs grep -L "SPDX-License-Identifier" 2>/dev/null || true)
          if [ -n "$missing" ]; then
            echo "Missing SPDX-License-Identifier header in:"
            echo "$missing"
            exit 1
          fi

  custodian:
    name: Custodian doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Custodian
        run: pip install git+https://github.com/Velascat/Custodian.git@main
      - name: Verify .custodian.yaml
        run: custodian-doctor --strict --repo .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src test

      - name: Test
        run: uv run pytest -q

      - name: Check docs integrity
        run: bash scripts/check_docs.sh
